name: Build Box64 for Termux

on:
  workflow_dispatch:  # Biar bisa dijalankan manual

jobs:
  build-termux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip android-ndk-r26b-linux.zip
        echo "ANDROID_NDK=$PWD/android-ndk-r26b" >> $GITHUB_ENV

    - name: Setup Termux Environment (Cara Resmi)
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip
        
        # Gunakan mirror resmi utermux.dev dengan nama file yang benar
        wget https://mirrors.utermux.dev/termux/termux-main/pool/main/liba/libandroid-sysv-semaphore/libandroid-sysv-semaphore_0.1_aarch64.deb
        
        7z x libandroid-sysv-semaphore_0.1_aarch64.deb
        tar -xf data.tar.xz
        sudo cp -rf data /
        sudo chmod 755 -R /data
        sudo chown -R $(whoami):$(whoami) /data
        
        echo "CFLAGS=-L/data/data/com.termux/files/usr/lib" >> $GITHUB_ENV
        echo "IS_TERMUX=1" >> $GITHUB_ENV

    - name: Build Box64 for Termux
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_C_COMPILER=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang \
          -DCMAKE_CXX_COMPILER=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++ \
          -DTERMUX=1 \
          -DARM_DYNAREC=1 \
          -DBAD_SIGNAL=1
        make -j$(nproc)

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: box64-termux
        path: build/box64
