name: Build Wine 11 Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Update system
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          clang \
          llvm \
          lld \
          git \
          wget \
          curl \
          autoconf \
          automake \
          libtool \
          pkg-config \
          flex \
          bison \
          zip \
          unzip \
          python3 \
          mingw-w64

    - name: Clone Wine 11
      run: |
        git clone https://github.com/wine-mirror/wine
        cd wine
        git checkout wine-11.0

    - name: Setup llvm-mingw
      run: |
        wget https://github.com/bylaws/llvm-mingw/releases/download/20250305/llvm-mingw-20250305-ucrt-ubuntu-20.04-x86_64.tar.xz
        tar -xf llvm-mingw-*.tar.xz
        echo "$(pwd)/llvm-mingw-*/bin" >> $GITHUB_PATH

    - name: Configure Wine (Termux style)
      run: |
        cd wine
        mkdir build && cd build

        CC=clang \
        CXX=clang++ \
        ../configure \
          --prefix=/data/data/com.termux/files/usr/opt/wine-ntsync \
          --enable-win64 \
          --enable-ntsync \
          --disable-tests \
          --with-mingw=clang \
          --enable-archs=i386,aarch64

    - name: Build Wine
      run: |
        cd wine/build
        make -j$(nproc)

    - name: Install to staging dir
      run: |
        cd wine/build
        make install DESTDIR=$PWD/pkg

    - name: Create .deb package
      run: |
        mkdir -p deb/DEBIAN
        mkdir -p deb/data/data/com.termux/files/usr/

        cp -r wine/build/pkg/data/data/com.termux/files/usr/* deb/data/data/com.termux/files/usr/

        cat <<EOF > deb/DEBIAN/control
        Package: wine-ntsync
        Version: 11.0
        Architecture: aarch64
        Maintainer: you
        Description: Wine 11 with ntsync for Termux
        EOF

        dpkg-deb --build deb wine-ntsync.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wine-ntsync
        path: wine-ntsync.deb
