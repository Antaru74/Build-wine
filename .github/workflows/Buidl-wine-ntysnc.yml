name: Build Wine 11 Termux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PREFIX: /data/data/com.termux/files/usr

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang llvm lld \
          git wget curl autoconf automake libtool \
          pkg-config flex bison zip unzip python3 \
          mingw-w64 zstd

    - name: Clone Wine 11
      run: |
        git clone https://github.com/wine-mirror/wine
        cd wine
        git checkout wine-11.0

    - name: Setup llvm-mingw
      run: |
        wget https://github.com/bylaws/llvm-mingw/releases/download/20250305/llvm-mingw-20250305-ucrt-ubuntu-20.04-x86_64.tar.xz
        tar -xf llvm-mingw-*.tar.xz
        echo "$(pwd)/llvm-mingw-*/bin" >> $GITHUB_PATH

    - name: Configure Wine
      run: |
        cd wine
        mkdir build && cd build

        CC=clang \
        CXX=clang++ \
        CFLAGS="-O2 -pipe" \
        CXXFLAGS="-O2 -pipe" \
        ../configure \
          --prefix=$PREFIX/opt/wine-ntsync \
          --enable-win64 \
          --enable-ntsync \
          --disable-tests \
          --with-mingw=clang \
          --enable-archs=i386,aarch64

    - name: Build Wine
      run: |
        cd wine/build
        make -j$(nproc)

    - name: Install to staging
      run: |
        cd wine/build
        make install DESTDIR=$PWD/pkg

    - name: Cleanup (reduce size)
      run: |
        find wine/build/pkg -name "*.a" -delete
        find wine/build/pkg -name "*.la" -delete

    - name: Prepare .deb structure
      run: |
        mkdir -p deb/DEBIAN
        mkdir -p deb/data/data/com.termux/files/usr

        cp -r wine/build/pkg/data/data/com.termux/files/usr/* \
          deb/data/data/com.termux/files/usr/

    - name: Create control file
      run: |
        cat <<EOF > deb/DEBIAN/control
        Package: wine-ntsync
        Version: 11.0
        Architecture: aarch64
        Maintainer: you
        Depends: libc++, libx11, libxcb, libxshmfence, libwayland, libdrm, zlib, zstd
        Description: Wine 11 with ntsync support for Termux
        EOF

    - name: Build .deb (FIXED XZ)
      run: |
        dpkg-deb -Zxz -z9 --build deb wine-ntsync.deb

    - name: Verify package
      run: |
        dpkg-deb -I wine-ntsync.deb
        dpkg-deb -c wine-ntsync.deb | head

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wine-ntsync-deb
        path: wine-ntsync.deb
